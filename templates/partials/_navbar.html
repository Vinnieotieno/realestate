{% load static %}
<link rel="stylesheet" href="{% static 'css/navbar.css' %}">

<nav class="navbar navbar-expand-lg vincent-navbar" role="navigation" aria-label="Main navigation">
  <div class="container navbar-shell">
    <!-- Brand Logo with SEO optimization -->
    <a class="navbar-brand" href="{% url 'index' %}" title="{{ site_name }} - Premium Real Estate in Kenya">
      <div class="brand-logo-wrapper">
        <img src="{% static 'img/logo.jpeg' %}" alt="{{ site_name }} Logo" class="brand-logo">
        <span class="brand-text">{{ site_name }}</span>
      </div>
    </a>

    <!-- Mobile Toggle Button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navigation Menu -->
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav navbar-menu mb-2 mb-lg-0" role="menubar">
        <!-- Main Navigation Items -->
        <li class="nav-item" role="none">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}"
             href="{% url 'index' %}"
             title="Home - {{ site_name }}"
             role="menuitem">
            <span class="nav-icon"><i class="fas fa-home"></i></span>
            <span class="nav-text">Home</span>
          </a>
        </li>

        <li class="nav-item" role="none">
          <a class="nav-link {% if 'listings' in request.path %}active{% endif %}"
             href="{% url 'listings' %}"
             title="Browse Properties - Find Your Dream Home"
             role="menuitem">
            <span class="nav-icon"><i class="fas fa-key"></i></span>
            <span class="nav-text">Properties</span>
          </a>
        </li>

        <li class="nav-item" role="none">
          <a class="nav-link {% if 'property-management' in request.path %}active{% endif %}"
             href="{% url 'property_management' %}"
             title="Property Management - Managed Properties"
             role="menuitem">
            <span class="nav-icon"><i class="fas fa-building"></i></span>
            <span class="nav-text">Management</span>
          </a>
        </li>

        <li class="nav-item" role="none">
          <a class="nav-link {% if 'about' in request.path %}active{% endif %}"
             href="{% url 'about' %}"
             title="About Us - {{ site_name }}"
             role="menuitem">
            <span class="nav-icon"><i class="fas fa-info-circle"></i></span>
            <span class="nav-text">About</span>
          </a>
        </li>

        <li class="nav-item" role="none">
          <a class="nav-link {% if 'contact' in request.path %}active{% endif %}"
             href="{% url 'contact' %}"
             title="Contact Us - Get in Touch"
             role="menuitem">
            <span class="nav-icon"><i class="fas fa-envelope"></i></span>
            <span class="nav-text">Contact</span>
          </a>
        </li>

        <li class="nav-item" role="none">
          <a class="nav-link {% if 'blog' in request.path %}active{% endif %}"
             href="{% url 'blog_list' %}"
             title="Read our latest blog posts"
             role="menuitem">
            <span class="nav-icon"><i class="fas fa-newspaper"></i></span>
            <span class="nav-text">Updates</span>
          </a>
        </li>

        <!-- Divider -->
        <li class="nav-divider" role="none"></li>

        <!-- Authentication Links -->
        {% if user.is_authenticated %}
          <li class="nav-item" role="none">
            <a class="nav-link nav-dashboard"
               href="{% url 'dashboard' %}"
               title="User Dashboard"
               role="menuitem">
              <span class="nav-icon"><i class="fas fa-user-circle"></i></span>
              <span class="nav-text">Dashboard</span>
            </a>
          </li>
          <li class="nav-item" role="none">
            <a class="nav-link cta-btn cta-logout"
               href="{% url 'logout' %}"
               title="Logout from your account"
               role="menuitem">
              <span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span>
              <span class="nav-text">Logout</span>
            </a>
          </li>
        {% else %}
          <li class="nav-item" role="none">
            <a class="nav-link nav-login"
               href="{% url 'login' %}"
               title="Login to your account"
               role="menuitem">
              <span class="nav-icon"><i class="fas fa-sign-in-alt"></i></span>
              <span class="nav-text">Login</span>
            </a>
          </li>
          <li class="nav-item" role="none">
            <a class="nav-link cta-btn cta-register"
               href="{% url 'register' %}"
               title="Create a new account"
               role="menuitem">
              <span class="nav-icon"><i class="fas fa-user-plus"></i></span>
              <span class="nav-text">Register</span>
            </a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<!-- Enhanced Navbar JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const navbar = document.querySelector('.vincent-navbar');
  const navbarCollapse = document.querySelector('.navbar-collapse');
  const navLinks = document.querySelectorAll('.vincent-navbar .nav-link');

  // Enhanced scroll effect – shadow when scrolled
  window.addEventListener('scroll', function() {
    const header = document.getElementById('site-header');
    if (!header) return;

    if (window.scrollY > 20) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  }, { passive: true });

  // Close mobile menu when clicking on a link
  navLinks.forEach(link => {
    link.addEventListener('click', () => {
      if (navbarCollapse.classList.contains('show')) {
        const bsCollapse = new bootstrap.Collapse(navbarCollapse);
        bsCollapse.hide();
      }
    });
  });

  // Add smooth scrolling for anchor links
  navLinks.forEach(link => {
    if (link.getAttribute('href').startsWith('#')) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const targetId = this.getAttribute('href');
        const targetElement = document.querySelector(targetId);

        if (targetElement) {
          targetElement.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    }
  });

  // Add ripple effect on click
  navLinks.forEach(link => {
    link.addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = e.clientX - rect.left - size / 2;
      const y = e.clientY - rect.top - size / 2;

      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      ripple.classList.add('ripple');

      this.appendChild(ripple);

      setTimeout(() => ripple.remove(), 600);
    });
  });
});
</script>
